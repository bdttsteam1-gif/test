<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claim Management Dashboard</title>
<script src="chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface2: #f8fafc;
    --border: #d1d5db;
    --accent: #2563eb;
    --accent2: #7c3aed;
    --accent3: #059669;
    --text: #111827;
    --text2: #6b7280;
    --red: #dc2626;
    --orange: #d97706;
    --yellow: #ca8a04;
    --radius: 12px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .header { padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .home-btn { display: flex; align-items: center; gap: 6px; text-decoration: none; color: #fff; background: var(--accent); font-size: 15px; font-weight: 700; padding: 8px 14px; border-radius: 8px; white-space: nowrap; }
  .home-btn:hover { background: #1d4ed8; }
  .home-btn .ico { font-size: 17px; }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header h1 span { color: var(--accent); }
  .search-wrap { flex: 1; max-width: 480px; position: relative; }
  .search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px 9px 38px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 14px; }
  .badge { background: var(--accent); color: white; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; margin-left: auto; }
  .year-switcher { display: flex; gap: 6px; align-items: center; }
  .year-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 14px; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .year-btn:hover { border-color: var(--accent); color: var(--accent); }
  .year-btn-active { background: var(--accent); border-color: var(--accent); color: #fff !important; }

  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* Dashboard (main) */
  .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card h2 { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }
  .card.full { grid-column: 1 / -1; }
  .stat-row { display: flex; gap: 12px; margin-bottom: 20px; }
  .stat { flex: 1; background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; }
  .stat .val { font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat .lbl { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .chart-wrap { position: relative; height: 300px; }

  /* Search results */
  .results-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .results-header h2 { font-size: 16px; font-weight: 700; }
  .results-header .count { font-size: 13px; color: var(--text2); }
  .back-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 14px; color: var(--text); font-size: 13px; cursor: pointer; }
  .back-btn:hover { border-color: var(--accent); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--surface2); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; position: sticky; top: 0; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:hover td { background: var(--surface2); cursor: pointer; }
  tr.active td { background: rgba(79,126,248,0.12); }

  /* Tags */
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .tag-blue { background: rgba(79,126,248,0.2); color: #7da3fb; }
  .tag-green { background: rgba(61,191,138,0.2); color: #5dd4a6; }
  .tag-red { background: rgba(224,90,90,0.2); color: #e87d7d; }
  .tag-yellow { background: rgba(245,200,66,0.2); color: #f5c842; }

  /* Detail panel */
  .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; }
  .detail-overlay.open { display: flex; align-items: flex-end; justify-content: flex-end; }
  .detail-panel { background: var(--surface); width: 560px; height: 100vh; overflow-y: auto; border-left: 1px solid var(--border); padding: 24px; }
  .detail-panel h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .detail-panel .no { font-size: 12px; color: var(--text2); margin-bottom: 20px; }
  .detail-close { position: absolute; top: 20px; right: 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; cursor: pointer; color: var(--text); font-size: 13px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-field { }
  .detail-field.full { grid-column: 1 / -1; }
  .detail-field label { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 4px; }
  .detail-field p { font-size: 13px; line-height: 1.5; background: var(--surface2); border-radius: 6px; padding: 8px 10px; min-height: 32px; word-break: break-word; }
  .section-divider { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; grid-column: 1 / -1; border-bottom: 1px solid var(--border); padding-bottom: 6px; }

  /* Lot/Item graph view */
  .graph-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .graph-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .graph-card h3 { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
  .graph-card p.hint { font-size: 11px; color: var(--text2); margin-top: 8px; text-align: center; }
  .graph-chart-wrap { position: relative; height: 260px; cursor: pointer; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state .ico { font-size: 48px; margin-bottom: 12px; }

  /* Top bar item list */
  .mini-list { display: flex; flex-direction: column; gap: 4px; max-height: 280px; overflow-y: auto; }
  .mini-item { display: flex; justify-content: space-between; padding: 8px 10px; border-radius: 6px; font-size: 13px; }
  .mini-item:hover { background: var(--surface2); }
  .mini-item .name { color: var(--text); flex: 1; }
  .mini-item .cnt { color: var(--accent); font-weight: 700; font-size: 13px; padding-left: 12px; }

  /* ===== Mobile ===== */
  @media (max-width: 768px) {
    .app { height: auto; min-height: 100vh; }
    .header { flex-wrap: wrap; padding: 12px 14px; gap: 8px; position: sticky; top: 0; z-index: 50; }
    .header h1 { font-size: 16px; }
    .year-switcher { margin-left: auto; }
    .year-btn { padding: 8px 12px; font-size: 13px; }
    .search-wrap { flex: 1 1 100%; max-width: none; order: 10; }
    .search-wrap input { font-size: 16px; padding: 11px 14px 11px 38px; }
    .badge { margin-left: 0; }
    .content { padding: 14px; overflow-y: visible; }
    .dashboard-grid { grid-template-columns: 1fr; gap: 14px; }
    .graph-section { grid-template-columns: 1fr; gap: 14px; }
    .stat-row { flex-wrap: wrap; gap: 10px; }
    .stat { flex: 1 1 calc(50% - 5px); min-width: 0; padding: 12px 14px; }
    .stat .val { font-size: 22px; }
    .card { padding: 14px; }
    .chart-wrap { height: 240px; }
    .graph-chart-wrap { height: 220px; }
    th, td { padding: 8px 10px; }
    .table-wrap { -webkit-overflow-scrolling: touch; }
    .detail-overlay.open { align-items: stretch; }
    .detail-panel { width: 100vw; max-width: 100vw; border-left: none; padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
    .detail-grid { grid-template-columns: 1fr; }
    .results-header { flex-wrap: wrap; }
    .back-btn { padding: 8px 14px; }
    .mini-item { padding: 10px; }
  }
  @media (max-width: 420px) {
    .stat { flex: 1 1 100%; }
    .chart-wrap { height: 210px; }
  }
</style>
<script src="claim-data.js"></script>
<script src="claim-sheet.js"></script>
</head>
<body>
<div class="app">
  <div class="header">
    <a href="index.html" class="home-btn"><span class="ico">🏠</span>홈</a>
    <h1>Claim <span>Dashboard</span></h1>
    <div class="year-switcher">
      <button class="year-btn" data-year="2024" onclick="switchYear('2024')">2024</button>
      <button class="year-btn" data-year="2025" onclick="switchYear('2025')">2025</button>
      <button class="year-btn year-btn-active" data-year="2026" onclick="switchYear('2026')">2026</button>
    </div>
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="국가·대리점·아이템·LOT 입력 후 Enter (2개 이상은 쉼표(,)로 구분 → 상세 목록)" autocomplete="off">
    </div>
    <button class="year-btn" id="uploadBtn" onclick="document.getElementById('excelFile').click()" title="현재 선택된 연도 시트에 신규 클레임만 추가됩니다">⬆ 엑셀 업로드</button>
    <input type="file" id="excelFile" accept=".xlsx,.xlsm" style="display:none" onchange="handleExcelUpload(this)">
    <button class="year-btn" id="resetExtraBtn" onclick="resetExtras()" title="업로드로 추가된 데이터를 삭제합니다" style="display:none">↺ 업로드 초기화</button>
    <div class="badge" id="totalBadge">0 건</div>
  </div>
  <div id="uploadStatus" style="display:none; padding:8px 24px; font-size:13px; background:#eff6ff; border-bottom:1px solid #bfdbfe; color:#1d4ed8;"></div>
  <div class="content" id="mainContent">
    <!-- Filled by JS -->
  </div>
</div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" onclick="closeDetail()">✕ 닫기</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
// Normalize
let currentYear = '2026';
let EXTRAS_ALL = { '2024': [], '2025': [], '2026': [] };

function normalizeRaw(arr) {
  return arr.map(r => {
    const o = {};
    for (const [k, v] of Object.entries(r)) o[k] = (v === null || v === undefined) ? '' : String(v).trim();
    return o;
  });
}

// ---- 최신순 정렬 (수신일 내림차순, 없으면 Complaint No. 내림차순) ----
function byNewest(a, b) {
  const da = a.recv_date || '', db = b.recv_date || '';
  if (da !== db) return da < db ? 1 : -1;
  return (a.no || '') < (b.no || '') ? 1 : -1;
}

// ---- 업로드 병합 데이터 (구글 시트 공유, 미설정 시 localStorage 폴백은 claim-sheet.js가 처리) ----
function buildYearData(year) {
  const base = normalizeRaw(window['RAW_' + year] || []);
  const extras = normalizeRaw(EXTRAS_ALL[year] || []);
  const seen = new Set(base.map(r => r.no));
  const merged = base.concat(extras.filter(r => r.no && !seen.has(r.no)));
  merged.sort(byNewest);
  return merged;
}

let DATA = normalizeRaw(window['RAW_' + currentYear] || []).sort(byNewest);

function updateUploadUI() {
  const extras = EXTRAS_ALL[currentYear] || [];
  const btn = document.getElementById('resetExtraBtn');
  const status = document.getElementById('uploadStatus');
  if (extras.length > 0) {
    btn.style.display = '';
    status.style.display = 'block';
    const scope = isClaimSheetConfigured() ? '전 직원 화면에 공유되어' : '이 브라우저에만 저장되어';
    status.textContent = '📌 ' + currentYear + '년: 엑셀 업로드로 추가된 신규 클레임 ' + extras.length + '건이 ' + scope + ' 있습니다. (기존 데이터는 그대로 유지됨)';
  } else {
    btn.style.display = 'none';
    status.style.display = 'none';
  }
}

function switchYear(year) {
  currentYear = year;
  DATA = buildYearData(year);
  rebuildDataMap();
  document.querySelectorAll('.year-btn').forEach(b => {
    if (b.dataset.year) b.classList.toggle('year-btn-active', b.dataset.year === year);
  });
  document.getElementById('searchInput').value = '';
  updateUploadUI();
  renderDashboard();
}

// ---- 엑셀 업로드: 신규 건만 추가 ----
const XLSX_COLMAP = {
  'Complaint No.':'no','Area':'area','Country':'country','Distributor':'dist','E-mail':'email',
  'Contact':'contact','Via':'via','Received date':'recv_date','Receiver':'receiver',
  '1st CLASS.':'c1','2nd CLASS.':'c2','3rd CLASS.':'c3','Device':'device',
  'Serial number':'serial','SW version':'sw','Item':'item','LOT No.':'lot','Control LOT':'ctrl_lot',
  'Title':'title','Complaint(Attachment)':'complaint','Severity Level':'severity',
  'Investigation DETS.':'invest','Action':'action','Reply':'reply','Replied Date':'replied'
};
function excelDateStr(v) {
  if (v === null || v === undefined || v === '') return '';
  if (v instanceof Date) {
    const p = n => String(n).padStart(2, '0');
    return v.getFullYear() + '-' + p(v.getMonth() + 1) + '-' + p(v.getDate());
  }
  const s = String(v).trim();
  const m = s.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if (m) return m[1] + '-' + String(m[2]).padStart(2,'0') + '-' + String(m[3]).padStart(2,'0');
  return s.startsWith('=') ? '' : s;
}
function handleExcelUpload(input) {
  const file = input.files && input.files[0];
  input.value = '';
  if (!file) return;
  const status = document.getElementById('uploadStatus');
  status.style.display = 'block';
  status.textContent = '⏳ "' + file.name + '" 읽는 중... (파일이 크면 1분 이상 걸릴 수 있습니다)';
  setTimeout(() => {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
        // 'Complaint list' 시트 찾기
        let sheetName = wb.SheetNames.find(n => n.trim().toLowerCase().indexOf('complaint list') !== -1);
        if (!sheetName) sheetName = wb.SheetNames.find(n => {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[n], { header: 1, range: 0, blankrows: false });
          return rows[0] && rows[0].some(h => String(h).trim() === 'Complaint No.');
        });
        if (!sheetName) { status.textContent = '⚠ "Complaint list" 시트를 찾을 수 없습니다.'; return; }
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header: 1, blankrows: false });
        const header = rows[0].map(h => String(h == null ? '' : h).trim());
        const colIdx = {};
        header.forEach((h, i) => { if (XLSX_COLMAP[h]) colIdx[XLSX_COLMAP[h]] = i; });
        let endIdx = header.indexOf('END Date');
        const prefix = currentYear.slice(2);
        const existing = new Set(DATA.map(r => r.no));
        const newRecs = [];
        for (let ri = 1; ri < rows.length; ri++) {
          const row = rows[ri];
          if (!row) continue;
          const get = k => {
            const i = colIdx[k];
            if (i === undefined || row[i] === undefined || row[i] === null) return '';
            const v = row[i];
            if (v instanceof Date) return excelDateStr(v);
            const s = String(v).trim();
            return s.startsWith('=') ? '' : s;
          };
          const no = get('no');
          if (!no || no.slice(0, 2) !== prefix) continue;
          if (existing.has(no)) continue;
          const rec = { no:no, area:get('area'), country:get('country'), dist:get('dist'), email:'',
            contact:get('contact'), via:get('via'), recv_date:excelDateStr(row[colIdx['recv_date']]),
            receiver:get('receiver'), c1:get('c1'), c2:get('c2'), c3:get('c3'), device:get('device'),
            serial:get('serial'), sw:get('sw'), item:get('item'), lot:get('lot'), ctrl_lot:get('ctrl_lot'),
            title:get('title'), complaint:get('complaint'), severity:get('severity'), invest:get('invest'),
            action:get('action'), reply:get('reply'), replied:excelDateStr(row[colIdx['replied']]),
            term:'', dur:'' };
          const endV = endIdx >= 0 ? row[endIdx] : null;
          if (endV instanceof Date) {
            rec.term = 'Closed';
            const rv = row[colIdx['recv_date']];
            if (rv instanceof Date) rec.dur = String(Math.round((endV - rv) / 86400000));
          } else { rec.term = 'On Going'; }
          newRecs.push(rec);
          existing.add(no);
        }
        if (newRecs.length === 0) {
          status.textContent = '✅ 신규 클레임 없음 — 기존 ' + DATA.length.toLocaleString() + '건이 모두 최신 상태입니다. (' + currentYear + '년)';
          updateBadge();
          return;
        }
        status.textContent = '⏳ 신규 클레임 ' + newRecs.length + '건 저장 중...' + (isClaimSheetConfigured() ? ' (전 직원 공유 저장소로 업로드)' : '');
        postClaimExtras(currentYear, newRecs).then(function(res) {
          EXTRAS_ALL[currentYear] = (EXTRAS_ALL[currentYear] || []).concat(newRecs);
          DATA = buildYearData(currentYear);
          rebuildDataMap();
          renderDashboard();
          updateUploadUI();
          updateBadge();
          const scope = res.mode === 'shared' ? '전 직원 화면에 자동으로 반영됩니다.' : '이 브라우저에만 저장되었습니다. (build_claim_data.py로 전체 반영 가능)';
          status.textContent = '✅ 신규 클레임 ' + newRecs.length + '건 추가 완료 — ' + scope + ' 현재 ' + currentYear + '년 총 ' + DATA.length.toLocaleString() + '건';
        }).catch(function(err) {
          status.textContent = '⚠ 저장 중 오류: ' + err.message;
        });
      } catch (err) {
        status.textContent = '⚠ 엑셀 처리 중 오류: ' + err.message;
      }
    };
    reader.onerror = function() { status.textContent = '⚠ 파일을 읽지 못했습니다.'; };
    reader.readAsArrayBuffer(file);
  }, 50);
}
function resetExtras() {
  const scope = isClaimSheetConfigured() ? '전 직원의 화면에서' : '이 브라우저에서만';
  if (!confirm(currentYear + '년에 업로드로 추가된 데이터를 ' + scope + ' 모두 삭제할까요? (claim-data.js의 기본 데이터는 유지됩니다)')) return;
  const status = document.getElementById('uploadStatus');
  status.style.display = 'block';
  status.textContent = '⏳ 삭제 중...';
  resetClaimExtras(currentYear).then(function() {
    EXTRAS_ALL[currentYear] = [];
    DATA = buildYearData(currentYear);
    rebuildDataMap();
    updateUploadUI();
    updateBadge();
    renderDashboard();
  }).catch(function(err) {
    status.textContent = '⚠ 삭제 중 오류: ' + err.message;
  });
}
function updateBadge() {
  document.getElementById('totalBadge').textContent = DATA.length.toLocaleString() + ' 건';
}

const COLORS = ['#4f7ef8','#3dbf8a','#f0943d','#7c5cbf','#e05a5a','#f5c842','#44c9d4','#e88f5a','#a3e05a','#d45ae8','#5ae8bb','#e85a8f','#5a8fe8','#e8d45a','#8fe85a'];
const COLORS2 = COLORS.map(c => c + '55');

function countBy(arr, key) {
  const m = {};
  for (const r of arr) {
    const v = r[key] || '(없음)';
    m[v] = (m[v] || 0) + 1;
  }
  return Object.entries(m).sort((a, b) => b[1] - a[1]);
}

function tag(text, cls='tag-blue') {
  if (!text) return '';
  return `<span class="tag ${cls}">${text}</span>`;
}

function severityTag(s) {
  if (!s) return '';
  if (s.includes('High') || s.includes('high')) return tag(s, 'tag-red');
  if (s.includes('Moderate') || s.includes('moderate')) return tag(s, 'tag-yellow');
  if (s.includes('Low') || s.includes('low')) return tag(s, 'tag-green');
  return tag(s, 'tag-blue');
}

function termTag(s) {
  if (!s) return '';
  if (s === 'Closed') return tag(s, 'tag-green');
  if (s === 'On Going') return tag(s, 'tag-yellow');
  return tag(s, 'tag-blue');
}

// ---- DETAIL PANEL ----
function showDetail(row) {
  const fields = [
    ['Complaint No.', row.no, false],

// ---- CHARTS ----
const chartInstances = {};
function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

function makeBarChart(canvasId, labels, values, clickFn) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId).getContext('2d');
  const top = labels.slice(0, 15);
  const vals = values.slice(0, 15);
  chartInstances[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: top,
      datasets: [{
        data: vals,
        backgroundColor: COLORS2.slice(0, top.length),
        borderColor: COLORS.slice(0, top.length),
        borderWidth: 2,
        borderRadius: 5,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8b90b8', font: { size: 11 } }, grid: { color: '#2d3150' } },
        y: { ticks: { color: '#8b90b8', font: { size: 11 } }, grid: { color: '#2d3150' } }
      },
      onClick: (event, elements) => {
        if (elements.length > 0 && clickFn) clickFn(top[elements[0].index]);
      }
    }
  });
}

function makeDoughnutChart(canvasId, labels, values, clickFn) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId).getContext('2d');
  const top = labels.slice(0, 10);
  const vals = values.slice(0, 10);
  chartInstances[canvasId] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: top,
      datasets: [{
        data: vals,
        backgroundColor: COLORS2.slice(0, top.length),
        borderColor: COLORS.slice(0, top.length),
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#8b90b8', font: { size: 11 }, boxWidth: 12 } }
      },
      onClick: (event, elements) => {
        if (elements.length > 0 && clickFn) clickFn(top[elements[0].index]);
      }
    }
  });
}

// ---- SEARCH LOGIC ----
function detectSearchType(keyword, matchedRows) {
  const kl = keyword.toLowerCase();
  // Check if majority match on country
  const countries = new Set(DATA.map(r => r.country.toLowerCase()));
  if (countries.has(kl)) return 'country';

  const dists = new Set(DATA.map(r => r.dist.toLowerCase()));
  if (dists.has(kl)) return 'distributor';

  // Check if it looks like a lot no. (alphanumeric pattern)
  const lots = new Set(DATA.map(r => r.lot.toLowerCase()).filter(Boolean));
  if (lots.has(kl)) return 'lot';

  const items = new Set(DATA.map(r => r.item.toLowerCase()).filter(Boolean));
  if (items.has(kl)) return 'item';

  // Partial matches
  const countryMatch = matchedRows.filter(r => r.country.toLowerCase().includes(kl)).length;
  const distMatch = matchedRows.filter(r => r.dist.toLowerCase().includes(kl)).length;
  const lotMatch = matchedRows.filter(r => r.lot.toLowerCase().includes(kl)).length;
  const itemMatch = matchedRows.filter(r => r.item.toLowerCase().includes(kl)).length;

  const maxVal = Math.max(countryMatch, distMatch, lotMatch, itemMatch);
  if (maxVal === 0) return 'generic';
  if (countryMatch === maxVal) return 'country';
  if (distMatch === maxVal) return 'distributor';
  if (lotMatch === maxVal) return 'lot';
  if (itemMatch === maxVal) return 'item';
  return 'generic';
}

// 검색 결과를 기억해 "자세히" 버튼이 상세 목록을 다시 그릴 수 있게 함
let lastSearch = { keyword: '', matched: [] };

function doSearch(rawKeyword) {
  // 쉼표(,)로 구분된 다중 키워드
  const terms = rawKeyword.split(',').map(s => s.trim()).filter(Boolean);
  if (terms.length === 0) { renderDashboard(); return; }

  // 모든 키워드가 매칭되어야 함(AND)
  const matched = DATA.filter(r => {
    const vals = Object.values(r).map(v => v.toLowerCase());
    return terms.every(t => vals.some(v => v.includes(t.toLowerCase())));
  });
  matched.sort(byNewest); // 검색 결과 최신순 정렬

  const label = terms.join(', ');
  if (matched.length === 0) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state"><div class="ico">🔍</div><p>"${label}"에 해당하는 결과가 없습니다.</p></div>`;
    return;
  }

  viewStack.push({ view: currentView, keyword: '' });
  currentView = 'search';
  lastSearch = { keyword: label, matched: matched, type: null };

  // 키워드 2개 이상 → 현재와 같이 상세 목록을 바로 표시
  if (terms.length >= 2) {
    renderGenericSearch(label, matched);
    return;
  }

  // 키워드 1개 → 국가/대리점/아이템 검색이면 대시보드 형태, 그 외에는 상세 목록
  const keyword = terms[0];
  const type = detectSearchType(keyword, matched);
  lastSearch.type = type;
  if (type === 'country' || type === 'distributor' || type === 'item' || type === 'lot') {
    renderDashboardSearch(keyword, matched, type);
  } else {
    renderGenericSearch(keyword, matched);
  }
}

  <div class="graph-section">
    <div class="graph-card">
      <h3>${secondIsItem ? '접수 국가' : '접수 국가'}</h3>
      <div class="graph-chart-wrap"><canvas id="dashCountryChart"></canvas></div>
      <p class="hint">막대를 클릭하면 해당 클레임 목록을 봅니다</p>
    </div>
    <div class="graph-card">
      <h3>3rd CLASS 분류</h3>
      <div class="graph-chart-wrap"><canvas id="dashC3Chart"></canvas></div>
      <p class="hint">항목을 클릭하면 해당 클레임 목록을 봅니다</p>
    </div>
  </div>
  <div class="dashboard-grid">
    <div class="card full">
      <h2>${secondTitle}</h2>
      <div class="chart-wrap"><canvas id="dashSecondChart"></canvas></div>
    </div>
  </div>
  <div id="dashSubResults"></div>`;

  document.getElementById('mainContent').innerHTML = html;

  requestAnimationFrame(() => {
    const topCountries = countryCounts.slice(0, 12);
    makeBarChart('dashCountryChart', topCountries.map(([k]) => k), topCountries.map(([, v]) => v), (country) => {
      showDashSubTable(matched.filter(r => r.country === country), `${keyword} — 국가: ${country}`);
    });
    makeDoughnutChart('dashC3Chart', c3Counts.map(([k]) => k).slice(0, 10), c3Counts.map(([, v]) => v).slice(0, 10), (c3) => {
      showDashSubTable(matched.filter(r => r.c3 === c3), `${keyword} — ${c3}`);
    });
    makeBarChart('dashSecondChart', secondCounts.map(([k]) => k), secondCounts.map(([, v]) => v), (val) => {
      const field = secondIsItem ? 'item' : 'country';
      showDashSubTable(matched.filter(r => r[field] === val), `${keyword} — ${val}`);
    });
  });
}

function showDashSubTable(rows, title) {
  const el = document.getElementById('dashSubResults');
  if (!el) return;
  el.innerHTML = `
  <div class="card" style="margin-top:20px">
    <div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px">${title} (${rows.length}건)</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Complaint No.</th><th>Item</th><th>LOT No.</th><th>3rd CLASS</th><th>국가</th><th>수신일</th><th>상태</th></tr></thead>
        <tbody>
          ${rows.map((r, i) => `
          <tr onclick="showDetail(DATA_MAP['${r.no}'])" title="클릭하여 상세 보기">
            <td style="color:var(--text2)">${i + 1}</td>
            <td style="font-weight:600;color:var(--accent)">${r.no}</td>
            <td>${r.item || '-'}</td>
            <td>${r.lot || '-'}</td>
            <td>${r.c3 || '-'}</td>
            <td>${r.country || '-'}</td>
            <td>${r.recv_date || '-'}</td>
            <td>${termTag(r.term) || r.term || '-'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
  el.scrollIntoView({ behavior: 'smooth' });
}

// [자세히] → 현재와 동일한 상세 목록
function showSearchDetail() {
  viewStack.push({ view: 'dashSearch', keyword: lastSearch.keyword });
  renderGenericSearch(lastSearch.keyword, lastSearch.matched);
}

function goBack() {
  if (viewStack.length > 0) {
    const prev = viewStack.pop();
    if (prev.view === 'dashSearch' && lastSearch.matched.length) {
      renderDashboardSearch(lastSearch.keyword, lastSearch.matched, lastSearch.type);
    } else {
      renderDashboard();
    }
  } else {
    renderDashboard();
  }
}

// ---- SEARCH INPUT (Enter를 눌러야만 검색 실행) ----
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const val = this.value.trim();
    if (val) doSearch(val);
    else renderDashboard();
  }
});
document.getElementById('searchInput').addEventListener('input', function() {
  if (!this.value.trim() && currentView !== 'dashboard') renderDashboard();
});

// ---- INIT ----
(async function initClaim() {
  const status = document.getElementById('uploadStatus');
  status.style.display = 'block';
  status.textContent = '⏳ 데이터 불러오는 중...';
  try {
    EXTRAS_ALL = await fetchAllClaimExtras();
  } catch (e) { /* claim-sheet.js가 이미 폴백 처리함 */ }
  DATA = buildYearData(currentYear);
  rebuildDataMap();
  updateUploadUI();
  renderDashboard();
})();
</script>
